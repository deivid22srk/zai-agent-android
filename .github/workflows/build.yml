name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRO: 'temurin'
  GRADLE_VERSION: '8.10.2'

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write      # to upload release artifacts / workflow assets
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRO }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: false
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Gradle version info
        run: ./gradlew --version

      - name: Clean
        run: ./gradlew clean --no-daemon

      - name: Compile + lint
        run: ./gradlew assembleDebug bundleRelease lintDebug --no-daemon --stacktrace

      - name: Generate debug keystore if missing
        if: hashFiles('debug.keystore') == ''
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Assemble release APK (debug-signed)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: zai-agent-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: zai-agent-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: zai-agent-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: |
            artifacts/zai-agent-debug-apk/*.apk
            artifacts/zai-agent-release-apk/*.apk
            artifacts/zai-agent-release-aab/*.aab
